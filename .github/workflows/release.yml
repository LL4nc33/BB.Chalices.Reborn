name: release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for a manual build (e.g. v0.1.0)'
        required: false
        default: 'dev'

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64 }
          - { os: ubuntu-latest,  rid: linux-x64 }
          - { os: macos-latest,   rid: osx-x64 }
          - { os: macos-latest,   rid: osx-arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Version label
        id: ver
        shell: bash
        run: echo "v=${{ github.event.inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Publish (self-contained single file)
        shell: bash
        run: |
          dotnet publish src/BB.Chalices.App/BB.Chalices.App.csproj \
            -c Release -r ${{ matrix.rid }} --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:EnableCompressionInSingleFile=true \
            -p:DebugType=none -p:DebugSymbols=false \
            -o publish

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          name="BB.Chalices.Reborn-${{ steps.ver.outputs.v }}-${{ matrix.rid }}"
          cd publish
          if [ "${{ runner.os }}" = "Windows" ]; then
            7z a "../dist/${name}.zip" BB.Chalices.App.exe
          else
            chmod +x BB.Chalices.App
            tar -czf "../dist/${name}.tar.gz" BB.Chalices.App
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}
          path: dist/*

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            Self-contained single-file builds (no .NET install needed).

            - Windows: `*-win-x64.zip` - unzip and run `BB.Chalices.App.exe`.
            - Linux: `*-linux-x64.tar.gz` - extract, `chmod +x`, run.
            - macOS: `*-osx-x64` (Intel) / `*-osx-arm64` (Apple Silicon). Unsigned, so first run needs
              `xattr -dr com.apple.quarantine BB.Chalices.App` or right-click - Open.
